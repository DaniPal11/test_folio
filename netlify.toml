[build]
command = "pnpm run build"
functions = "netlify/functions"
publish = "dist/spa"

[build.environment]
NODE_VERSION = "20"
NPM_FLAGS = "--version"

[functions]
external_node_modules = ["express"]
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
