[build]
command = "pnpm run build"
functions = "netlify/functions"
publish = "dist/spa"

[build.environment]
NODE_VERSION = "20"
NPM_FLAGS = "--version"

[functions]
external_node_modules = ["express"]
node_bundler = "esbuild"

[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"

[[redirects]]
force = true
from = "/*"
status = 200
to = "/index.html"
